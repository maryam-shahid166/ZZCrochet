<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z&amp;Z Crochet — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Quicksand:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDF6EE; --cream-deep:#F8ECDC; --rose:#F0B8C2; --terracotta:#E8967E;
    --sage:#AFC9A8; --butter:#F6D87E; --charcoal:#4A3F3A; --charcoal-soft:#8a7d76;
    --line:rgba(74,63,58,0.14);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);font-family:'Quicksand',sans-serif;color:var(--charcoal);}
  header{padding:26px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:#fff;}
  h1{font-family:'Fraunces',serif;font-size:22px;margin:0;}
  .pill{font-family:'Space Mono',monospace;font-size:11px;background:var(--cream-deep);padding:6px 12px;border-radius:999px;}
  main{padding:28px 32px;max-width:1100px;margin:0 auto;}
  .login-box{max-width:380px;margin:90px auto;background:#fff;padding:32px;border-radius:20px;box-shadow:0 14px 30px rgba(74,63,58,0.12);text-align:center;}
  .login-box input{width:100%;padding:11px 14px;margin-top:10px;border:2px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;}
  .login-box button{margin-top:16px;width:100%;padding:12px;border:none;border-radius:999px;background:var(--terracotta);color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
  .filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .filters button{
    border:2px solid var(--line);background:#fff;padding:8px 16px;border-radius:999px;
    font-weight:700;font-size:13px;cursor:pointer;color:var(--charcoal-soft);
  }
  .filters button.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
  .order-card{
    background:#fff;border-radius:18px;padding:20px 22px;margin-bottom:16px;
    box-shadow:0 6px 18px rgba(74,63,58,0.08);
    display:grid;grid-template-columns:1fr auto;gap:14px;
  }
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .order-id{font-family:'Space Mono',monospace;font-size:12px;color:var(--charcoal-soft);}
  .order-title{font-family:'Fraunces',serif;font-size:18px;margin:2px 0 6px;}
  .meta-row{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--charcoal-soft);margin-bottom:10px;}
  .meta-row span strong{color:var(--charcoal);}
  .colors{display:flex;gap:6px;margin-bottom:10px;}
  .chip{width:20px;height:20px;border-radius:6px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,0.18);}
  .notes{font-size:13px;background:var(--cream-deep);padding:10px 12px;border-radius:10px;color:var(--charcoal);}
  .thumbs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .thumbs img{width:56px;height:56px;object-fit:cover;border-radius:10px;border:2px solid var(--line);}
  .status-col{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  select.status{
    font-family:'Space Mono',monospace;font-size:11.5px;text-transform:uppercase;
    border:2px solid var(--line);border-radius:999px;padding:7px 12px;background:#fff;
  }
  .badge-new{color:#fff;background:var(--terracotta);}
  .badge-in-progress{color:#fff;background:var(--butter);color:var(--charcoal);}
  .badge-completed{color:#fff;background:var(--sage);}
  .del-btn{font-size:12px;color:var(--charcoal-soft);background:none;border:none;cursor:pointer;text-decoration:underline;}
  .empty{text-align:center;padding:60px 0;color:var(--charcoal-soft);}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h1>Z&amp;Z Admin</h1>
  <p style="color:var(--charcoal-soft);font-size:13px;">Sign in with your admin credentials.</p>
  <input type="text" id="userInput" placeholder="Username">
  <input type="password" id="passInput" placeholder="Password">
  <button onclick="login()">Sign in</button>
  <p id="loginError" style="color:#c0392b;font-size:12.5px;margin-top:10px;"></p>
</div>

<div id="dashboard" style="display:none;">
  <header>
    <h1>🐾 Z&amp;Z Crochet — Orders</h1>
    <span class="pill" id="orderCount">0 orders</span>
  </header>
  <main>
    <div class="filters" id="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="new">New</button>
      <button data-filter="in-progress">In progress</button>
      <button data-filter="completed">Completed</button>
    </div>
    <div id="ordersList"></div>
  </main>
</div>

<script>
// Set this to wherever your backend is deployed, e.g. "https://zz-crochet-api.onrender.com"
const API_BASE = window.location.origin;

let authHeader = sessionStorage.getItem('zzAdminAuth') || '';
let allOrders = [];
let activeFilter = 'all';

if (authHeader) showDashboard();

async function login(){
  const user = document.getElementById('userInput').value;
  const pass = document.getElementById('passInput').value;
  authHeader = 'Basic ' + btoa(`${user}:${pass}`);
  const res = await fetch(`${API_BASE}/api/orders`, { headers: { Authorization: authHeader } });
  if(res.ok){
    sessionStorage.setItem('zzAdminAuth', authHeader);
    showDashboard();
  } else {
    document.getElementById('loginError').textContent = 'Invalid username or password.';
  }
}

function showDashboard(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOrders();
}

async function loadOrders(){
  const res = await fetch(`${API_BASE}/api/orders`, { headers: { Authorization: authHeader } });
  if(!res.ok){ sessionStorage.removeItem('zzAdminAuth'); location.reload(); return; }
  allOrders = await res.json();
  render();
}

function render(){
  const list = document.getElementById('ordersList');
  const filtered = activeFilter === 'all' ? allOrders : allOrders.filter(o => o.status === activeFilter);
  document.getElementById('orderCount').textContent = `${allOrders.length} order${allOrders.length===1?'':'s'}`;

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty">No orders here yet.</div>';
    return;
  }

  list.innerHTML = filtered.map(o => `
    <div class="order-card">
      <div>
        <div class="order-top">
          <div>
            <div class="order-id">${o.id} · ${new Date(o.createdAt).toLocaleString()}</div>
            <div class="order-title">${o.itemType} — ${o.name}</div>
          </div>
        </div>
        <div class="meta-row">
          <span><strong>${o.size}</strong> size</span>
          <span><strong>${o.yarnType}</strong></span>
          <span>qty <strong>${o.qty}</strong></span>
          <span>${o.email}</span>
          ${o.deadline ? `<span>needed by <strong>${o.deadline}</strong></span>` : ''}
        </div>
        <div class="colors">
          ${(o.paletteHex||'').split(',').filter(Boolean).map(h=>`<div class="chip" style="background:${h.trim()}"></div>`).join('')}
        </div>
        ${o.notes ? `<div class="notes">${o.notes}</div>` : ''}
        ${o.images && o.images.length ? `<div class="thumbs">${o.images.map(src=>`<a href="${API_BASE}${src}" target="_blank"><img src="${API_BASE}${src}"></a>`).join('')}</div>` : ''}
      </div>
      <div class="status-col">
        <select class="status badge-${o.status}" onchange="updateStatus('${o.id}', this.value)">
          <option value="new" ${o.status==='new'?'selected':''}>New</option>
          <option value="in-progress" ${o.status==='in-progress'?'selected':''}>In progress</option>
          <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
        </select>
        <button class="del-btn" onclick="deleteOrder('${o.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

async function updateStatus(id, status){
  await fetch(`${API_BASE}/api/orders/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', Authorization: authHeader },
    body: JSON.stringify({ status })
  });
  loadOrders();
}

async function deleteOrder(id){
  if(!confirm('Delete this order permanently?')) return;
  await fetch(`${API_BASE}/api/orders/${id}`, { method: 'DELETE', headers: { Authorization: authHeader } });
  loadOrders();
}

document.getElementById('filters').addEventListener('click', e => {
  if(e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  render();
});
</script>
</body>
</html>
